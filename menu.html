/* 🍽️ DISPLAY */

const menuList = document.getElementById("menuList");

function displayMenu(data) {

  menuList.innerHTML = "";

  data.forEach(item => {

    const div = document.createElement("div");

    div.className = "bg-white rounded-xl shadow hover:shadow-xl hover:-translate-y-1 transition cursor-pointer";

    div.innerHTML = `

      <div class="bg-gray-50 h-48 flex items-center justify-center rounded-t-xl overflow-hidden">

        <img src="${item.img}" loading="lazy" class="max-h-full object-contain">

      </div>

      <div class="p-4 text-center">

        <h3 class="font-semibold text-lg text-gray-800">

          ${currentLang === "th" ? item.name : item.name_en}

        </h3>

        <p class="text-green-700 mt-1 font-medium">

          ${item.price.toLocaleString()} ${currentLang === "th" ? "บาท" : "THB"}

        </p>

      </div>

    `;

    div.onclick = () => showDetail(item);

    menuList.appendChild(div);

  });

}

/* 🔍 SEARCH */

document.getElementById("search").addEventListener("input", function() {

  const val = this.value.toLowerCase();

  displayMenu(menuData.filter(item =>

    item.name.toLowerCase().includes(val) ||

    item.name_en.toLowerCase().includes(val)

  ));

});

/* 🧃 FILTER */

function filterMenu(cat) {

  if (cat === "all") return displayMenu(menuData);

  displayMenu(menuData.filter(i => i.category === cat));

}

/* 🪟 MODAL */

function showDetail(item) {

  document.getElementById("modal").classList.remove("hidden");

  document.getElementById("modalImg").src = item.img;

  document.getElementById("modalName").innerText =

    currentLang === "th" ? item.name : item.name_en;

  document.getElementById("modalNameEn").innerText =

    currentLang === "th" ? item.name_en : "";

  document.getElementById("modalDesc").innerText = item.desc;

  document.getElementById("modalPrice").innerText =

    item.price.toLocaleString() + " " + (currentLang === "th" ? "บาท" : "THB");

}

function closeModal() {

  document.getElementById("modal").classList.add("hidden");

}

window.onclick = function(e) {

  if (e.target.id === "modal") closeModal();

};

/* 🚀 INIT */

setLang(currentLang);
