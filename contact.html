<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Mormoodong</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ICON -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-green-50 font-sans">

<!-- 🔝 NAVBAR -->
<header class="flex justify-between items-center px-8 py-4 bg-green-700 text-white">
  <h1 class="text-xl font-bold">MORMOODONG</h1>

  <nav class="flex items-center gap-6">
    <a href="index.html" data-lang="home">Home</a>
    <a href="menu.html" data-lang="menu">Menu</a>
    <a href="about.html" data-lang="about">About</a>
    <a href="contact.html" data-lang="contact">Contact</a>

    <!-- 🌐 Language -->
    <div class="ml-4 flex gap-2">
      <button onclick="setLang('th')" class="px-2 py-1 bg-green-500 rounded hover:bg-green-600">TH</button>
      <button onclick="setLang('en')" class="px-2 py-1 bg-green-500 rounded hover:bg-green-600">EN</button>
    </div>
  </nav>
</header>

<!-- 📍 HERO -->
<section class="h-[35vh] flex items-center justify-center text-white text-center"
  style="background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('images/วิว.webp') center/cover">

  <h1 class="text-4xl font-bold" data-lang="contact_title">
    ติดต่อเรา
  </h1>
</section>

<!-- 📌 CONTENT -->
<section class="max-w-6xl mx-auto flex flex-col md:flex-row gap-10 px-6 py-16">

  <!-- INFO -->
  <div class="flex-1 bg-white p-6 rounded-xl shadow">
    <h2 class="text-2xl font-bold text-green-800 mb-4" data-lang="info">
      ข้อมูลร้าน
    </h2>

    <p class="mb-2"><strong>📍</strong> <span data-lang="address">ร้านหมอมูดง ภูเก็ต</span></p>
    <p class="mb-2"><strong>📞</strong> 088-766-1634</p>
    <p class="mb-4"><strong>⏰</strong> <span data-lang="time">10:00 - 21:00 น.</span></p>

    <!-- 📲 CALL -->
    <a href="tel:0887661634"
       class="inline-block px-6 py-2 bg-green-500 text-white rounded hover:bg-green-600 transition"
       data-lang="call">
      โทรเลย
    </a>

    <!-- 🔥 SOCIAL -->
    <div class="flex gap-4 mt-6">
      <a href="https://www.facebook.com/profile.php?id=100064469810850"
         class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white text-lg hover:scale-110 transition">
        <i class="fab fa-facebook-f"></i>
      </a>

      <a href="https://www.tiktok.com/@mor_mudong?_r=1&_t=ZS-95fX737jPiJ"
         class="w-12 h-12 bg-black rounded-full flex items-center justify-center text-white text-lg hover:scale-110 transition">
        <i class="fab fa-tiktok"></i>
      </a>
    </div>
  </div>

  <!-- 🗺️ MAP -->
  <div class="flex-1">
    <iframe 
      class="w-full h-[300px] rounded-xl shadow"
      src="https://www.google.com/maps?q=หมอมูดง+ภูเก็ต&output=embed"
      loading="lazy">
    </iframe>
  </div>

</section>

<!-- 🔻 FOOTER -->
<footer class="flex justify-center items-center h-20 bg-green-700 text-white">
  © 2026 Mormoodong Restaurant
</footer>

<!-- 🌐 LANGUAGE -->
<script>
const langData = {
  th: {
    home: "หน้าแรก",
    menu: "เมนู",
    about: "เกี่ยวกับ",
    contact: "ติดต่อ",
    contact_title: "ติดต่อเรา",
    info: "ข้อมูลร้าน",
    address: "ร้านหมอมูดง ภูเก็ต",
    time: "10:00 - 21:00 น.",
    call: "โทรเลย"
  },
  en: {
    home: "Home",
    menu: "Menu",
    about: "About",
    contact: "Contact",
    contact_title: "Contact Us",
    info: "Restaurant Info",
    address: "Mormoodong Restaurant, Phuket",
    time: "10:00 AM - 9:00 PM",
    call: "Call Now"
  }
};

function setLang(lang) {
  localStorage.setItem("lang", lang);
  document.querySelectorAll("[data-lang]").forEach(el => {
    const key = el.getAttribute("data-lang");
    el.innerText = langData[lang][key];
  });
}

setLang(localStorage.getItem("lang") || "th");
</script>

</body>
</html>
